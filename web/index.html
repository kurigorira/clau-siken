  .tile .sub{color:var(--muted);font-size:.8rem;margin-top:3px}

  .qhead{display:flex;justify-content:space-between;align-items:center;color:var(--muted);font-size:.85rem}

  .qtext{font-size:1.15rem;font-weight:700;margin:14px 0;line-height:1.5}
  .choices{display:flex;flex-direction:column;gap:10px}

  .note{font-size:.9rem;color:#2d7d5a;background:#eafaf4;border-radius:8px;padding:6px 10px;margin-top:5px}

  .scope-meta{font-size:.9rem;color:#48566a;margin:4px 0 0 30px}

  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
  .savebar{position:sticky;bottom:0;background:linear-gradient(180deg,rgba(245,247,251,0),var(--bg) 40%);

  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#26303b;color:#fff;

  .hidden{display:none}
  footer{text-align:center;color:var(--muted);font-size:.78rem;margin-top:30px}

function today(){const n=new Date();const s=new Date(2026,5,13);return n<s?s:n;}

function dayDiff(a,b){return Math.round((stripTime(b)-stripTime(a))/86400000);}
function stripTime(d){return new Date(d.getFullYear(),d.getMonth(),d.getDate());}
function fmt(d){return (d.getMonth()+1)+"/"+d.getDate();}
function iso(d){const m=String(d.getMonth()+1).padStart(2,"0");const dd=String(d.getDate()).padStart(2,"0");return d.getFullYear()+"-"+m+"-"+dd;}
function sameDay(a,b){return stripTime(a).getTime()===stripTime(b).getTime();}
function esc(s){return (s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}

function nextTest(t){
  let best=null,name="";
  for(const s of getSubjects()){const td=testDate(s);if(td<stripTime(t))continue;if(!best||td<best){best=td;name=s.name;}}
  if(!best)return null;
  return {name,days:dayDiff(t,best)};
}

// ============ スケジュール生成 ============
function phaseDetail(s,daysUntil){
  if(daysUntil<=2)return"総仕上げ：暗記の最終確認＋単元テスト/ワークの間違い直し";
  if(daysUntil<=6)return"問題演習：ワークを2周目、間違えた問題を中心に解き直し";
  return"基礎固め：教科書を読み直し＋ワークを1周";
}
function remindersFor(d,subs){
  const out=[];
  for(const s of subs){
    if(!s.submitDate)continue;
    const p=s.submitDate.split("-").map(Number);
    const due=new Date(p[0],p[1]-1,p[2]);
    const dd=dayDiff(d,due);
    if(dd>=0&&dd<=3){
      const label=`${s.name}ワーク提出（${p[1]}/${p[2]}）`;
      out.push(dd===0?("★本日提出: "+label):("提出まであと"+dd+"日: "+label));
    }
  }
  return out;
}
function genSchedule(start){
  const subs=getSubjects().slice().sort((a,b)=>testDate(a)-testDate(b));
  const last=testDate(subs[subs.length-1]);
  const wkd=STORE.settings.weekdayMin, wke=STORE.settings.weekendMin;
  const plans=[];
  for(let d=stripTime(start);d<=last;d=new Date(d.getTime()+86400000)){
    const plan={date:new Date(d),tasks:[],reminders:remindersFor(d,subs),testToday:"",note:"",custom:false};
    for(const s of subs)if(sameDay(testDate(s),d))plan.testToday=s.name;
    const up=subs.filter(s=>testDate(s)>=stripTime(d));
    // 自動生成（おまかせ）
    if(up.length>0){
      const wd=d.getDay();let budget=(wd===0||wd===6)?wke:wkd;
      const next=up[0];const du=dayDiff(d,testDate(next));
      if(du<=2){plan.tasks.push({subject:next.name,min:budget,detail:phaseDetail(next,du)});}
      else if(up.length>=2){const p=Math.floor(budget*2/3);const sec=up[1];
        plan.tasks.push({subject:next.name,min:p,detail:phaseDetail(next,du)});
        plan.tasks.push({subject:sec.name,min:budget-p,detail:phaseDetail(sec,dayDiff(d,testDate(sec)))});}
      else{plan.tasks.push({subject:next.name,min:budget,detail:phaseDetail(next,du)});}
    }
    // 手動編集（上書き）
    const ov=STORE.days[iso(d)];
    if(ov){
      plan.note=ov.note||"";
      if(ov.plan&&ov.plan.trim()!==""){
        plan.tasks=ov.plan.split("\n").map(l=>l.trim()).filter(l=>l!=="").map(l=>({line:l}));
        plan.custom=true;
      }
    }
    plans.push(plan);
  }
  return plans;
}

// ============ 答え合わせ ============
function normalize(s){
  s=(s||"").trim();let out="";
  for(const ch of s){const c=ch.codePointAt(0);
    if(c>=0xFF10&&c<=0xFF19)out+=String.fromCharCode(c-0xFF10+48);
    else if(c>=0xFF21&&c<=0xFF3A)out+=String.fromCharCode(c-0xFF21+65);
    else if(c>=0xFF41&&c<=0xFF5A)out+=String.fromCharCode(c-0xFF41+97);
    else if(ch==="　"||ch===" "){}
    else if(ch==="＾")out+="^"; else if(ch==="×")out+="*";
    else if(ch==="²")out+="^2"; else if(ch==="³")out+="^3";
    else out+=ch;
  }
  return out.toLowerCase();
}
function isCorrect(p,input){
  const n=normalize(input);if(!n)return false;
  const acc=(p.accept&&p.accept.length)?p.accept:[p.answer];
  return acc.some(a=>normalize(a)===n);
}

// ============ 共通UI ============
const app=document.getElementById("app");
function toast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");
  clearTimeout(toast._t);toast._t=setTimeout(()=>t.classList.remove("show"),1800);}
function setCountdown(){
  const nt=nextTest(today());const el=document.getElementById("countdown");
  if(!nt){el.innerHTML="🎉 テストはすべて終了！";return;}
  el.innerHTML = nt.days===0 ? ("今日は <b>"+esc(nt.name)+"</b> のテスト本番！")
    : ("次のテスト：<b>"+esc(nt.name)+"</b> まで あと <b>"+nt.days+"</b> 日");
}

// ============ 今日やること / スケジュール ============
function viewToday(){
  const plans=genSchedule(today());const t=today();
  let body="";
  const todayPlan=plans.find(p=>sameDay(p.date,t));
  if(todayPlan){
    body+=`<div class="card"><h2 class="sec">📅 今日 ${fmt(t)}(${WD[t.getDay()]}) やること</h2>`;
    body+=renderTaskLines(todayPlan);
    body+=`</div>`;
  } else body+=`<div class="card"><p>今日の予定はありません（テスト期間外、または全テスト終了）。</p></div>`;
  body+=`<h2 class="sec">🗓 これからの全日程 <span class="hint">（各日の「✏️編集」で予定・メモを変えられます）</span></h2><div class="card">`;
  for(const p of plans){
    if(p.date<stripTime(t))continue;
    body+=`<div class="day"><div class="d"><span>${fmt(p.date)}(${WD[p.date.getDay()]})${p.testToday?` <span class="test-badge">本番：${esc(p.testToday)}</span>`:""}${p.custom?`<span class="edited-badge">編集済</span>`:""}</span>
      <button class="edit" onclick="editDay('${iso(p.date)}')">✏️編集</button></div>`;
    body+=renderTaskLines(p);
    body+=`</div>`;
  }
  body+=`</div>`;
  app.innerHTML=backBtn()+body;
}
function renderTaskLines(p){
  let s="";
  if(p.testToday)s+=`<p><span class="test-badge">★ テスト本番：${esc(p.testToday)}</span></p>`;
  if(p.tasks.length===0&&!p.testToday)s+=`<p class="task">予定なし</p>`;
  for(const tk of p.tasks){
    if(tk.line!==undefined)s+=`<p class="task">・${esc(tk.line)}</p>`;
    else s+=`<p class="task">・${esc(tk.subject)} <span class="min">${tk.min}分</span> … ${esc(tk.detail)}</p>`;
  }
  if(p.note)s+=`<div class="note">📝 ${esc(p.note)}</div>`;
  for(const r of p.reminders)s+=`<p class="rem">⚠ ${esc(r)}</p>`;
  return s;
}

  const dt=new Date(y,m-1,d);
  app.innerHTML=backBtn("viewToday()")+`
    <h2 class="sec">✏️ ${fmt(dt)}(${WD[dt.getDay()]}) の予定を編集</h2>
    <div class="card">
      <div class="field">
        <label>この日の予定（1行に1つ。空っぽなら自動の「おまかせ」プランに戻ります）</label>
        <textarea id="ed_plan" placeholder="例）数学 ワークP10〜20&#10;英語 単語テスト勉強 30分"></textarea>
      </div>
      <div class="field">
        <label>メモ（部活・予定など。自由に）</label>
        <textarea id="ed_note" placeholder="例）午前は部活、夜に勉強"></textarea>
      </div>
      <div class="actions">
        <button class="btn" onclick="saveDay('${isoDate}')">保存</button>
        <button class="btn ghost" onclick="viewToday()">キャンセル</button>
        <button class="btn ghost" onclick="clearDay('${isoDate}')">この日をリセット</button>
      </div>
      <div class="hint">「予定」を書くと、その日はおまかせプランの代わりにあなたの予定が表示されます。空にして保存すると自動プランに戻ります。</div>
    </div>`;
  document.getElementById("ed_plan").value=ov.plan||"";
  document.getElementById("ed_note").value=ov.note||"";
}
function saveDay(isoDate){
  const plan=document.getElementById("ed_plan").value;
  const note=document.getElementById("ed_note").value;
  if((plan&&plan.trim())||(note&&note.trim())){STORE.days[isoDate]={plan:plan,note:note};}
  else{delete STORE.days[isoDate];}
  saveStore();toast("保存しました");viewToday();
}
function clearDay(isoDate){delete STORE.days[isoDate];saveStore();toast("この日をリセットしました");viewToday();}

      <div class="row2">

        <div class="field"><label>休日の勉強時間（分）</label><input id="set_wke" type="number" min="0" step="10"></div>
      </div>
      <div class="hint">この時間を各教科に自動で配分します。日ごとの細かい予定は「今日やること」画面の各日「✏️編集」から変えられます。</div>
    </div>
    <h2 class="sec">各教科のテスト範囲・提出物</h2>`;
  subs.forEach((s,i)=>{
    body+=`<div class="edit-subj">
      <div class="head">${s.icon} ${esc(s.name)}</div>
      <div class="row2">
        <div class="field"><label>テスト日</label><input id="s_date_${i}" type="date"></div>
        <div class="field"><label>提出物の締切（任意）</label><input id="s_sub_${i}" type="date"></div>
      </div>
      <div class="field"><label>テスト範囲</label><textarea id="s_scope_${i}"></textarea></div>
      <div class="field"><label>提出物（説明）</label><input id="s_subtext_${i}" type="text"></div>
      <div class="field"><label>アドバイス</label><textarea id="s_adv_${i}"></textarea></div>
    </div>`;
  });
  body+=`<div class="savebar">
      <button class="btn" onclick="saveEdit()">すべて保存</button>
      <button class="btn ghost" onclick="home()">もどる</button>
      <button class="btn ghost" onclick="resetAll()">初期状態に戻す</button>
    </div>
    <div class="hint">※ 編集内容はこの端末のブラウザに保存されます。別の端末でも使いたいときは「💾バックアップ」で書き出して読み込んでください。</div>`;
  app.innerHTML=backBtn()+body;
  // 値をセット
  document.getElementById("set_wkd").value=STORE.settings.weekdayMin;
  document.getElementById("set_wke").value=STORE.settings.weekendMin;
  subs.forEach((s,i)=>{
    document.getElementById(`s_date_${i}`).value=`2026-${String(s.month).padStart(2,"0")}-${String(s.day).padStart(2,"0")}`;
    document.getElementById(`s_sub_${i}`).value=s.submitDate||"";
    document.getElementById(`s_scope_${i}`).value=s.scope||"";
    document.getElementById(`s_subtext_${i}`).value=s.submit||"";
    document.getElementById(`s_adv_${i}`).value=s.advice||"";
  });
}
function saveEdit(){
  STORE.settings.weekdayMin=Math.max(0,parseInt(document.getElementById("set_wkd").value||"0",10));
  STORE.settings.weekendMin=Math.max(0,parseInt(document.getElementById("set_wke").value||"0",10));
  DEFAULT_SUBJECTS.forEach((d,i)=>{
    STORE.subjects[d.name]={
      testDate:document.getElementById(`s_date_${i}`).value||"",
      submitDate:document.getElementById(`s_sub_${i}`).value||"",
      scope:document.getElementById(`s_scope_${i}`).value,
      submit:document.getElementById(`s_subtext_${i}`).value,
      advice:document.getElementById(`s_adv_${i}`).value,
    };
  });
  saveStore();toast("保存しました");home();
}
function resetAll(){
  if(!confirm("すべての編集内容（範囲・提出物・予定・設定）を初期状態に戻します。よろしいですか？"))return;
  STORE={subjects:{},settings:{weekdayMin:60,weekendMin:120},days:{}};
  saveStore();toast("初期状態に戻しました");home();
}

// ============ バックアップ ============
function viewBackup(){
  app.innerHTML=backBtn()+`
    <h2 class="sec">💾 バックアップ（他の端末へ移す）</h2>
    <div class="card">
      <p class="hint">編集内容はこの端末のブラウザに保存されています。下の文字列をコピーして保存すれば、別の端末の「読み込み」に貼り付けて同じ設定を再現できます。</p>
      <div class="field"><label>書き出し（この内容をコピー）</label><textarea id="bk_out" readonly></textarea></div>
      <div class="actions"><button class="btn sub sm" onclick="copyBackup()">コピー</button></div>
      <div class="field" style="margin-top:18px"><label>読み込み（コピーした内容を貼り付け）</label><textarea id="bk_in" placeholder="ここに貼り付け"></textarea></div>
      <div class="actions"><button class="btn" onclick="importBackup()">読み込む</button><button class="btn ghost" onclick="home()">もどる</button></div>
    </div>`;
  document.getElementById("bk_out").value=JSON.stringify(STORE);
}
function copyBackup(){const el=document.getElementById("bk_out");el.select();
  try{navigator.clipboard.writeText(el.value);}catch(e){document.execCommand("copy");}toast("コピーしました");}
function importBackup(){
  const v=document.getElementById("bk_in").value.trim();if(!v){toast("貼り付けてください");return;}
  try{const obj=JSON.parse(v);
    STORE={subjects:obj.subjects||{},settings:Object.assign({weekdayMin:60,weekendMin:120},obj.settings||{}),days:obj.days||{}};
    saveStore();toast("読み込みました");home();
  }catch(e){toast("読み込めませんでした（内容を確認）");}
}

// ============ クイズ ============
function viewQuizSelect(){
  const t=today();const subs=getSubjects();
  let body=`<h2 class="sec">✏️ どの教科に挑戦する？</h2><div class="subj-list">`;
  subs.forEach((s,i)=>{
    const du=dayDiff(t,testDate(s));
    const dl=du>=0?`${s.month}/${s.day}・あと${du}日`:`${s.month}/${s.day}・終了`;
    body+=`<div class="subj" onclick="startQuiz(${i})"><div class="ic">${s.icon}</div>
      <div><div class="nm">${esc(s.name)}</div><div class="dl">${dl}</div></div></div>`;
  });
  body+=`<div class="subj full" onclick="startQuiz(-1)"><div class="ic">🎯</div><div class="nm">全教科とおして挑戦</div></div>`;
  body+=`</div>`;
  app.innerHTML=backBtn()+body;
}
let QZ=null;
function startQuiz(idx){
  const subs=getSubjects();let items=[];
  if(idx===-1){for(const s of subs)for(const p of s.problems)items.push({subject:s.name,icon:s.icon,p});}
  else{const s=subs[idx];for(const p of s.problems)items.push({subject:s.name,icon:s.icon,p});}
  QZ={items,i:0,correct:0,answered:false};renderQuestion();
}
function renderQuestion(){
  const {items,i}=QZ;
  if(i>=items.length){return renderResult();}
  const it=items[i];const p=it.p;
  let body=backBtn("viewQuizSelect()");
  body+=`<div class="card">
    <div class="qhead"><span>${it.icon} ${esc(it.subject)}</span><span>第 ${i+1} / ${items.length} 問</span></div>
    <div class="prog"><i style="width:${(i/items.length)*100}%"></i></div>
    <div class="qtext">${esc(p.q)}</div>`;
  if(p.choices&&p.choices.length){
    body+=`<div class="choices" id="choices">`;
    p.choices.forEach((c,ci)=>{body+=`<button class="choice" onclick="answerChoice(${ci})">${esc(c)}</button>`;});
    body+=`</div>`;
  }else{
    body+=`<div class="answerbox"><input id="ans" type="text" placeholder="答えを入力" autocomplete="off">
      <button class="btn" onclick="answerText()">こたえる</button></div>`;
  }
  body+=`<div id="result"></div></div>`;
  app.innerHTML=body;
  const inp=document.getElementById("ans");
  if(inp){inp.focus();inp.addEventListener("keydown",e=>{if(e.key==="Enter")answerText();});}
}
function showVerdict(ok){
  const it=QZ.items[QZ.i];const p=it.p;if(ok)QZ.correct++;
  const r=document.getElementById("result");
  r.innerHTML=`<div class="verdict ${ok?'ok':'ng'}">${ok?"⭕ 正解！":"❌ 不正解… 正解は「"+esc(p.answer)+"」"}</div>
    ${p.explain?`<div class="explain">💡 ${esc(p.explain)}</div>`:""}
    <div class="next"><button class="btn" onclick="nextQuestion()">${QZ.i+1>=QZ.items.length?"結果を見る →":"次の問題 →"}</button></div>`;
  QZ.answered=true;
}
function answerChoice(ci){
  if(QZ.answered)return;const it=QZ.items[QZ.i];const p=it.p;
  const ok=normalize(p.choices[ci])===normalize(p.answer);
  document.querySelectorAll("#choices .choice").forEach((b,bi)=>{
    b.style.pointerEvents="none";
    if(normalize(p.choices[bi])===normalize(p.answer))b.classList.add("correct");
    else if(bi===ci&&!ok)b.classList.add("wrong");
  });
  showVerdict(ok);
}
function answerText(){
  if(QZ.answered)return;const it=QZ.items[QZ.i];const p=it.p;
  const v=document.getElementById("ans").value;document.getElementById("ans").disabled=true;
  showVerdict(isCorrect(p,v));
}
function nextQuestion(){QZ.i++;QZ.answered=false;renderQuestion();}
function renderResult(){
  const {items,correct}=QZ;const pct=Math.round(correct/items.length*100);
  let msg;
  if(correct===items.length)msg="🎉 全問正解！この調子で本番もいける！";
  else if(pct>=80)msg="👍 よくできています。間違えた問題だけもう一度！";
  else msg="📚 間違えた問題は解説を読んで、明日また挑戦しよう。";
  app.innerHTML=backBtn("viewQuizSelect()")+`<div class="card score">
    <div class="big">${correct} / ${items.length}</div>
    <div>正答率 ${pct}%</div><div class="msg">${esc(msg)}</div>
    <div style="margin-top:18px"><button class="btn" onclick="viewQuizSelect()">もう一度えらぶ</button></div>
  </div>`;
}

home();
</script>
